[theme]
theme = "native"

[icons]
icons = "material-nf"

[[block]]
block = "cpu"
interval = 1
format = " $icon $frequency ($utilization) "

[[block]]
block = "temperature"
format = " $icon $max "

[[block]]
block = "memory"
format = " $icon $mem_used.eng(w:3, p:G) ($mem_used_percents) "

[[block]]
block = "disk_space"
path = "/"
format = " $icon $used.eng(w:2)/$available.eng(w:2) "

[[block]]
block = "custom"
command = "echo '\uf0ac ' `curl ip-api.com/line/?fields=query`"
interval = 60

[[block]]
block = "net"
# If 'wlan0' fails, comment out the device line to auto-detect
device = "wlan0"
format = " $icon $ssid ($signal_strength) "
format_alt = " $icon $ip "

[[block]]
block = "backlight"

[[block]]
block = "sound"
[block.theme_overrides]
#idle_bg = "#123456"
#warning_fg = "#88B090"
warning_fg = "#A86F6F"
#good_bg = "#123456"
#critical_bg = "#123456"
#info_bg = "#123456"

[[block]]
block = "sound"
driver = "pulseaudio"
device_kind = "source"    # This targets your microphone
[block.theme_overrides]
warning_fg = "#A86F6F"

[[block]]
block = "battery"
driver = "sysfs"
interval = 10
format = " $icon $percentage {$time_remaining} $power "
full_format = " $icon $percentage {$time_remaining.dur(hms:true, min_unit:m) |}"

[[block]]
block = "time"
interval = 60
format = "  $timestamp.datetime(f:'(%V) %a, %d.%m.%Y') "

[[block]]
block = "time"
interval = 60
format = " $timestamp.datetime(f:'%R') "
