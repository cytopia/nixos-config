[theme]
theme = "native"

[icons]
icons = "material-nf"

[[block]]
block = "cpu"
interval = 2
format = " $icon$frequency ($utilization) "

[[block]]
block = "temperature"
format = " $icon$max "

# GPU
[[block]]
block = "custom"
interval = 1
json = true
command = '''
# Get current frequency and convert to MHz (it's stored in MHz already in Xe)
cur=$(cat /sys/class/drm/card0/device/tile0/gt0/freq0/cur_freq)
max=$(cat /sys/class/drm/card0/device/tile0/gt0/freq0/max_freq)

# Colors from your palette
NORMAL="#80b3ff" # Your blue
BOOST="#EBCB8B"  # Your performance yellow

# If GPU is boosting above 1000MHz, use the Yellow color
if [ "$cur" -gt 1000 ]; then
    COLOR=$BOOST
    COLOR=$BOOST
else
    COLOR=$NORMAL
fi

#echo "{\"text\": \"<span color='$COLOR'>󰢮 ${cur}MHz</span>\"}"
echo "{\"text\": \"<span>󰢮 ${cur}MHz</span>\"}"
'''




[[block]]
block = "memory"
format = " $icon$mem_used.eng(w:3, p:G, prefix_space) ($mem_used_percents) "

[[block]]
block = "disk_space"
path = "/"
format = " $icon $used.eng(w:2,hide_unit,hide_prefix)/$available.eng(w:2,prefix_space) "

[[block]]
block = "custom"
#command = "echo '\uf0ac '`curl -s --connect-timeout 2 --max-time 3 ip-api.com/line/?fields=query`"
command = "echo '\uf0ac '`curl -s --connect-timeout 2 --max-time 3  208.95.112.1/line/?fields=query`"
interval = 10

[[block]]
block = "net"
# If 'wlan0' fails, comment out the device line to auto-detect
device = "tun0"
format = " $icon $ip "
missing_format = ""
format_alt = " $icon $ip / $ipv6 / NS: $nameserver "
[block.theme_overrides]
idle_bg = "#A86F6F"
idle_fg = "#FFFFFF"


[[block]]
block = "net"
# If 'wlan0' fails, comment out the device line to auto-detect
device = "wlan0"
format = " $icon $ssid ($signal_strength) "
format_alt = " $icon $ip ($bitrate) "

[[block]]
block = "custom"
command = ''' i3status-rs-bluetooth.sh '''
interval = 2
json = true
[block.theme_overrides]
warning_fg = "#A86F6F"
idle_fg = "#80b3ff"
good_fg = "#005ce6"

[[block]]
block = "sound"
driver = "pulseaudio"
[block.theme_overrides]
warning_fg = "#A86F6F"

[[block]]
block = "sound"
driver = "pulseaudio"
device_kind = "source" # This targets your microphone
[block.theme_overrides]
warning_fg = "#A86F6F"

[[block]]
block = "custom"
command = "custom-camera-toggle"
json = true
interval = 1
[block.theme_overrides]
idle_fg = "#A86F6F"
[[block.click]]
button = "left"
update = false
cmd = "custom-camera-toggle toggle"


#[[block]]
#block = "backlight"

[[block]]
block = "battery"
driver = "sysfs"
interval = 1
#format = " $icon $percentage {$time_remaining} $power "
full_format = " $icon $percentage {($time_remaining.dur(hms:true, min_unit:m))|}"
not_charging_format = " a asd "
charging_format = " $icon $percentage "
missing_format = " "
[block.theme_overrides]
warning_fg = "#A86F6F"
critical_bg = "#A86F6F"
critical_fg = "#FFFFFF"


[[block]]
block = "custom"
interval = 2
json = true
# 1. The Display Logic (checks profile and outputs Icon + Text + Theme Color)
command = '''
profile=$(powerprofilesctl get)
case "$profile" in
  "performance")
    echo '{"text": "  Performance", "state": "Warning"}' # Yellow
    ;;
  "balanced")
    echo '{"text": "  Balanced"}'                         # Normal (No state)
    ;;
  "power-saver")
    echo '{"text": "  Power Saver", "state": "Good"}'    # Green
    ;;
  *)
    echo '{"text": " ❓ Unknown", "state": "Idle"}'
    ;;
esac
'''
[block.theme_overrides]
warning_fg = "#EBCB8B" # Force pure Yellow
good_fg = "#50fa7b"    # Force pure Green
# 2. The Click Action (Left-click to cycle profiles instantly)
[[block.click]]
button = "left"
update = true
cmd = '''
profile=$(powerprofilesctl get)
if [ "$profile" = "performance" ]; then
    powerprofilesctl set balanced
elif [ "$profile" = "balanced" ]; then
    powerprofilesctl set power-saver
elif [ "$profile" = "power-saver" ]; then
    powerprofilesctl set performance
fi
'''




[[block]]
block = "time"
interval = 60
format = "  $timestamp.datetime(f:'(%V) %a, %d.%m.%Y') "

[[block]]
block = "time"
interval = 60
format = " $timestamp.datetime(f:'%R') "
[block.theme_overrides]
idle_fg = "#ffffff"
