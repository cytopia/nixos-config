########################################################################
# Labels & Color Palette (Variablized)
########################################################################

# Define the palette using user options (@variable)
set -gq @color_bg      "colour235" # Base background (Dark Grey)
set -gq @color_fg      "colour136" # Base foreground (Yellow)
set -gq @color_main    "colour33"  # Primary Accent (Blue)
set -gq @color_accent  "colour202" # Secondary Accent (Orange)
set -gq @color_success "colour64"  # Success/Clock (Green)
set -gq @color_alert   "colour160" # Alert/Bell (Red)
set -gq @color_muted   "colour244" # Muted text (Grey)
set -gq @color_info    "colour6"   # Info/Cyan (Cyan)

# Mode palette
set -gq @mode_color_bg_normal  "colour33"   # Blue
set -gq @mode_color_bg_copy    "colour202"  # Bright Orange
set -gq @mode_color_bg_view    "colour64"   # Green
set -gq @mode_color_bg_command "colour136"  # Yellow
set -gq @mode_color_bg_choose  "colour6"    # Cyan
set -gq @mode_color_bg_zoom    "colour160"  # Red
set -gq @mode_color_bg_options "colour13"   # Magenta

set -gq @mode_color_fg_normal  "black"  # Blue
set -gq @mode_color_fg_copy    "black"  # Bright Orange
set -gq @mode_color_fg_view    "black"  # Green
set -gq @mode_color_fg_command "black"  # Yellow
set -gq @mode_color_fg_choose  "black"  # Cyan
set -gq @mode_color_fg_zoom    "black"  # Red
set -gq @mode_color_fg_options "black"  # Magenta

# Labels (Change these to use Icons if desired)
set -gq @label_normal  ""
#set -gq @label_normal  " NORMAL "
set -gq @label_copy    "  COPY  "
set -gq @label_visual  " VISUAL "
set -gq @label_view    "  VIEW  "
set -gq @label_command " COMMAND"
set -gq @label_choose  " CHOOSE "
set -gq @label_zoom    "  ZOOM  "
set -gq @label_options " OPTIONS"


########################################################################
# Global UI Elements
########################################################################

###
### Statusbar
###

# Color: status bar
set-option -g status-style "fg=#{@color_fg},bg=#{@color_bg}"

# Color: Tab (inactive)
set-window-option -g window-status-style "fg=color240,bg=colour236"

# Color: Tab (current)
set-window-option -g window-status-current-style "fg=black,bg=#{@color_accent}"

# (DISABLED): lazyvim makes to many background ui changes, so that all tabs always blink
# set window-status-format "#{?window_activity_flag,#[fg=red],Color: Tab (with activity)
# set-window-option -g window-status-activity-style "fg=yellow,blink"

# Color: Tab (with bell ringing - urgent)
set-window-option -g window-status-bell-style "fg=#{@color_bg},bg=#{@color_alert}"



# Pane borders
set-option -g pane-border-style "fg=#{@color_bg}"
set-option -g pane-active-border-style "fg=#{@color_muted}"

# Message text (Command prompt)
set-option -g message-style "fg=#{@color_accent},bg=#{@color_bg}"

# Pane number display (Prefix + q)
#set-option -g display-panes-active-colour "#{@color_main}"
#set-option -g display-panes-colour "#{@color_accent}"

# Clock Mode (Prefix + t)
#set-window-option -g clock-mode-colour "#{@color_success}"


########################################################################
# Status Bar Format String
########################################################################

set-option -g status-justify centre
set-option -g status-left-length 40
set-option -g status-right-length 60
#set-option -g status-left-length 100

# Logic Breakdown:
# 1. We check for CHOOSE/COPY/VIEW/OPTIONS first.
# 2. We only check for ZOOM if NONE of the above are active.
# 3. We only show NORMAL if absolutely nothing else is active.

set -g status-left "\
#{?#{==:#{pane_mode},tree-mode},#[bg=#{@mode_color_bg_choose}]#[fg=#{@mode_color_fg_choose}]#{@label_choose},\
#{?#{==:#{pane_mode},buffer-mode},#[bg=#{@mode_color_bg_choose}]#[fg=#{@mode_color_fg_choose}]#{@label_choose},\
#{?#{==:#{pane_mode},copy-mode},#[bg=#{@mode_color_bg_copy}]#[fg=#{@mode_color_fg_copy}]#{@label_copy},\
#{?#{==:#{pane_mode},view-mode},#[bg=#{@mode_color_bg_view}]#[fg=#{@mode_color_fg_view}]#{@label_view},\
#{?#{==:#{client_key_table},OPTIONS},#[bg=#{@mode_color_bg_options}]#[fg=#{@mode_color_fg_options}]#{@label_options},\
#{?#{==:#{client_key_table},command},#[bg=#{@mode_color_bg_command}]#[fg=#{@mode_color_fg_command}]#{@label_command},\
#{?window_zoomed_flag,#[bg=#{@mode_color_bg_zoom}]#[fg=#{@mode_color_fg_zoom}]#{@label_zoom},\
#[bg=#{@mode_color_bg_normal}]#[fg=#{@mode_color_fg_normal}]#{@label_normal}}}}}}}}#[default]\
#[fg=white][#[fg=#{@color_info}]S: #[fg=#{@color_fg}]#S#[fg=white]]"

set-option -g status-right "#[fg=white][#[fg=#{@color_info}]Tab: #[fg=#{@color_fg}]#I#[fg=white]] [#[fg=#{@color_info}]Pane: #[fg=#{@color_fg}]#P#[fg=white]]"
