########################################################################
# Keybindings: Prefix and Basics
########################################################################

# bind-key -n           # Alias for -T root. Makes the key work without pressing the prefix
# bind-key -r           # enable repeat (without pressing prefix key again)
# bind-key -T <table>


# Change Prefix Key
# C-b is not acceptable -- Vim uses it
# C-a is not acceptable -- Screen uses it
# C-s is OK
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Nested Tmux Session
# Allows us to use C-s s <command> to send commands
# to a TMUX session inside another TMUX session
#bind-key s send-prefix


########################################################################
# Navigation & Layout (vim style)
########################################################################

# Select panes (hjkl)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Resize Panes (HJKL - repeatable)
bind-key -r H resize-pane -L 1
bind-key -r J resize-pane -D 1
bind-key -r K resize-pane -U 1
bind-key -r L resize-pane -R 1

# Move window left|right (< and > repeatable)
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# Split window with current path ( - and \ )
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"


########################################################################
# Modes
########################################################################

# Command Prompt: Use Emacs for single-line efficiency
set -g status-keys emacs

# Copy Mode (Visual Mode): Use Vi for movement/selection
setw -g mode-keys vi


########################################################################
# Misc commands
########################################################################


# Clear screen and scrollback history
# <Ctrl> <l>
bind-key -n C-l send-keys C-l \; run 'tmux clear-history'

# Reload config file
# <Ctrl>+<s>  <r>
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded in ~/.config/tmux/tmux.conf"

# Hide statusbar
# <Ctrl>+<s>  <t>
bind-key t set-option status

# Kill window/pange
# http://unix.stackexchange.com/a/30283
bind-key & confirm-before -p "kill window #W? (y/n)" kill-window
bind-key x confirm-before -p "kill pane #W? (y/n)" kill-pane

# Sync panes - send what you're typing to other panes.
# <Ctrl>+<s>  <Ctrl>+<s>
bind-key C-s set-window-option synchronize-panes

