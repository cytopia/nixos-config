########################################################################
# Copy / Paste
########################################################################

# Selection controls
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle

# COPY: 'y' in copy-mode or 'Prefix + y' in normal mode
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "wl-copy"
bind-key y run "tmux show-buffer | wl-copy" \; display 'Copied to System Clipboard'

# PASTE: 'p' from Wayland clipboard
# IMPROVED: --no-newline prevents accidental execution of commands.
bind-key p run "wl-paste --no-newline | tmux load-buffer - ; tmux paste-buffer"
