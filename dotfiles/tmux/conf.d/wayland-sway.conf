###
### New Session
###
# Update these variables from the client shell every time you attach
#set-option -g update-environment "DISPLAY WAYLAND_DISPLAY SWAYSOCK XDG_RUNTIME_DIR DBUS_SESSION_BUS_ADDRESS XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_ID XDG_SESSION_TYPE GDK_BACKEND QT_QPA_PLATFORM SDL_VIDEODRIVER MOZ_ENABLE_WAYLAND NIXOS_OZONE_WL ELECTRON_OZONE_PLATFORM_HINT SSH_AUTH_SOCK"

# 1. Start with the core session variables (standard 'set' overwrites)
set-option -g update-environment "DISPLAY WAYLAND_DISPLAY SWAYSOCK XDG_RUNTIME_DIR"

# 2. Append Desktop & Portal info (Note the '-ag' and the leading space in the string!)
set-option -ag update-environment " DBUS_SESSION_BUS_ADDRESS XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP"

# 3. Append Wayland/NixOS Toolkit hints
set-option -ag update-environment " XDG_SESSION_ID XDG_SESSION_TYPE GDK_BACKEND QT_QPA_PLATFORM"

# 4. Append App-specific Wayland flags
set-option -ag update-environment " SDL_VIDEODRIVER MOZ_ENABLE_WAYLAND NIXOS_OZONE_WL ELECTRON_OZONE_PLATFORM_HINT"

# 5. Append Auth/SSH
set-option -ag update-environment " SSH_AUTH_SOCK"


###
### Existing Session (pane)
###
# If this is an existing long-running session (and you have logged out and back in again)
# Use this command (for every pane) to update/sync the env variables.
alias refresh-tmux='eval $(tmux show-environment -s)'
